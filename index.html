<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain For Sale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Georgia', serif;
      color: #f5f0e8;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      max-width: 600px;
    }

    .badge {
      display: inline-block;
      background: #c8a96e;
      color: #0a0a0a;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 2px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: #f5f0e8;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #c8a96e;
      margin: 30px auto;
    }

    p {
      font-size: 18px;
      color: #a89880;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    a {
      color: #c8a96e;
      text-decoration: none;
      font-size: 20px;
      letter-spacing: 0.5px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    a:hover {
      border-bottom-color: #c8a96e;
    }

    .cta {
      margin-top: 40px;
      display: inline-block;
      background: transparent;
      border: 1px solid #c8a96e;
      color: #c8a96e;
      padding: 14px 36px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }

    .cta:hover {
      background: #c8a96e;
      color: #0a0a0a;
      border-bottom-color: transparent;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Domain For Sale</div>
    <h1>This domain is for sale</h1>
    <div class="divider"></div>
    <p>Interested in acquiring this domain?</p>
    <p>Send an email to:</p>
    <br>
    <a href="mailto:contact@consuai.com">contact@consuai.com</a>
    <br>
    <a href="mailto:contact@consuai.com" class="cta">Make an offer</a>
  </div>
</body>
</html>
